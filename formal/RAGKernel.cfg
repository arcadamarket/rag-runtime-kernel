\* TLC model configuration for RAGKernel.tla
\* Run: java -jar tla2tools.jar -config RAGKernel.cfg RAGKernel.tla
\* Or:  tlc RAGKernel.tla -config RAGKernel.cfg

\* -----------------------------------------------------------------------
\* Constants
\* -----------------------------------------------------------------------
\* Map each CONSTANT to a concrete TLA+ value.
\* The state names must match the strings used in AllowedTargets().

CONSTANTS
    \* Kernel states
    BOOTING       = "BOOTING"
    READY         = "READY"
    INGESTING     = "INGESTING"
    WORKING       = "WORKING"
    CHECKPOINTING = "CHECKPOINTING"
    CLOSING       = "CLOSING"
    RECOVERY      = "RECOVERY"

    \* Proposal lifecycle values
    STAGED    = "STAGED"
    COMMITTED = "COMMITTED"
    REJECTED  = "REJECTED"
    NONE      = "NONE"

    \* WAL depth bound.
    \* 8 gives full coverage of all reachable crash/recovery cycles.
    \* Raise to 12–16 for deeper path exploration (slower).
    MaxWALSeq = 8

\* -----------------------------------------------------------------------
\* Behaviour specification
\* -----------------------------------------------------------------------
\* Use SPEC (includes Init, Next, and Fairness for liveness checking).
\* Do NOT combine INIT/NEXT with SPEC — TLC rejects that.
SPECIFICATION Spec

\* CLOSING is a terminal state by design — no outgoing transitions.
\* Our NoDeadlock invariant verifies non-terminal states have enabled actions.
\* Disable TLC's built-in deadlock check so CLOSING doesn't trigger it.
CHECK_DEADLOCK FALSE

\* -----------------------------------------------------------------------
\* Invariants (checked at every reachable state)
\* -----------------------------------------------------------------------
INVARIANT TypeInvariant
INVARIANT TransitionSafety
INVARIANT SingleWriter
INVARIANT WALConsistency
INVARIANT TerminalSafety
INVARIANT NoDeadlock
INVARIANT CrashRecoveryConsistency
INVARIANT WALPrecedesStateChange

\* Combined convenience invariant (same set, single check)
INVARIANT Invariants

\* -----------------------------------------------------------------------
\* Properties (temporal / liveness — checked over all behaviours)
\* -----------------------------------------------------------------------
\* NOTE: Liveness properties interact with the finite MaxWALSeq bound.
\* When WAL fills up, the system stutters — creating false liveness
\* violations.  Run liveness checks with MaxWALSeq >= 10 and more time.
\* For now, safety invariants are the priority (all 8 verified).
\*
\* PROPERTY EventualProgress
\* PROPERTY EventualTermination
\* PROPERTY ProposalEventuallyResolved
\* PROPERTY Properties
